<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#000000"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <title>CA Countdown</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width:100%; height:100%;
      background:#000;
      color:#e8e8e8;
      font-family:'Space Mono', monospace;
      overflow:hidden;
      -webkit-tap-highlight-color:transparent;
    }

    /* ═══════════════════════════
       SETUP SCREEN
    ═══════════════════════════ */
    #setup {
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      height:100vh;
      gap:24px;
      padding:40px 28px;
    }

    #setup h1 {
      font-family:'Bebas Neue', cursive;
      font-size:42px;
      letter-spacing:6px;
      color:#c8a96e;
      text-align:center;
      line-height:1.1;
    }

    #setup p {
      font-size:11px;
      color:#333;
      letter-spacing:3px;
      text-align:center;
      text-transform:uppercase;
    }

    .field { display:flex; flex-direction:column; gap:10px; width:100%; max-width:300px; }
    .field label { font-size:10px; letter-spacing:3px; color:#444; text-transform:uppercase; }
    .field input {
      background:#0d0d0d;
      border:1px solid #222;
      border-radius:12px;
      color:#e8e8e8;
      font-family:'Space Mono', monospace;
      font-size:16px;
      padding:14px 18px;
      width:100%;
      outline:none;
      -webkit-appearance:none;
    }
    .field input:focus { border-color:#c8a96e; }
    .field input::-webkit-calendar-picker-indicator { filter:invert(0.4); }

    .btn-setup {
      background:#c8a96e;
      border:none;
      border-radius:14px;
      color:#000;
      font-family:'Bebas Neue', cursive;
      font-size:22px;
      letter-spacing:5px;
      padding:16px;
      width:100%;
      max-width:300px;
      cursor:pointer;
    }

    /* ═══════════════════════════
       COUNTDOWN SCREEN
    ═══════════════════════════ */
    #screen {
      display:none;
      flex-direction:column;
      align-items:center;
      justify-content:space-between;
      height:100vh;
      width:100vw;
      padding:50px 24px 36px;
    }

    /* ── TOP: time ── */
    .top { display:flex; flex-direction:column; align-items:center; gap:6px; }

    #livetime {
      font-family:'Bebas Neue', cursive;
      font-size:72px;
      letter-spacing:8px;
      color:#e8e8e8;
      line-height:1;
    }

    #livedate {
      font-size:11px;
      letter-spacing:5px;
      color:#2a2a2a;
      text-transform:uppercase;
    }

    /* ── CENTER: big number ── */
    .center {
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:4px;
    }

    .days-label {
      font-size:11px;
      letter-spacing:5px;
      color:#2a2a2a;
      text-transform:uppercase;
    }

    #daysNumber {
      font-family:'Bebas Neue', cursive;
      font-size:160px;
      line-height:0.85;
      color:#c8a96e;
      letter-spacing:-4px;
    }

    #daysNumber.urgent  { color:#e05555; }
    #daysNumber.warning { color:#e0a030; }

    .days-word {
      font-size:12px;
      letter-spacing:8px;
      color:#6a4e28;
      text-transform:uppercase;
      margin-top:8px;
    }

    #statusMsg {
      font-family:'Bebas Neue', cursive;
      font-size:22px;
      letter-spacing:4px;
      color:#2a2a2a;
      text-align:center;
      margin-top:6px;
    }

    /* ── CIRCLES GRID ── */
    .grid-wrap {
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      width:100%;
    }

    .grid-label {
      font-size:9px;
      letter-spacing:4px;
      color:#1e1e1e;
      text-transform:uppercase;
    }

    #circlesGrid {
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:6px;
      width:100%;
      max-width:360px;
      padding:0 4px;
    }

    .dot {
      border-radius:50%;
      flex-shrink:0;
      width:14px;
      height:14px;
    }
    .dot.gone  { background:#c8a96e; }
    .dot.today { background:#ffffff; box-shadow:0 0 8px rgba(255,255,255,0.7); }
    .dot.left  { background:#1c1c1c; }

    /* ── BOTTOM ── */
    .bottom {
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
    }

    #examTag {
      font-size:10px;
      letter-spacing:3px;
      color:#1e1e1e;
      text-transform:uppercase;
    }

    #progressBar {
      width:180px;
      height:2px;
      background:#111;
      border-radius:2px;
      overflow:hidden;
      margin-top:4px;
    }
    #progressFill {
      height:100%;
      background:#c8a96e;
      border-radius:2px;
    }
    #progressLabel {
      font-size:9px;
      letter-spacing:2px;
      color:#1e1e1e;
      margin-top:4px;
    }

    /* reset button - tiny, bottom right */
    #resetBtn {
      position:fixed;
      bottom:14px;
      right:14px;
      background:transparent;
      border:1px solid #111;
      border-radius:8px;
      color:#222;
      font-family:'Space Mono', monospace;
      font-size:9px;
      letter-spacing:1px;
      padding:6px 10px;
      cursor:pointer;
      text-transform:uppercase;
      z-index:99;
    }
  </style>
</head>
<body>

<!-- ═══ SETUP ═══ -->
<div id="setup">
  <h1>CA Foundation<br/>Countdown</h1>
  <p>Ek baar set karo — phir bhool jao</p>

  <div class="field">
    <label>Aaj ki date (Start)</label>
    <input type="date" id="startInput"/>
  </div>

  <div class="field">
    <label>Exam Date</label>
    <input type="date" id="examInput"/>
  </div>

  <button class="btn-setup" onclick="saveSetup()">SHURU KARO ▶</button>
</div>

<!-- ═══ COUNTDOWN ═══ -->
<div id="screen">

  <div class="top">
    <div id="livetime">00:00</div>
    <div id="livedate">MON, 01 JAN</div>
  </div>

  <div class="center">
    <div class="days-label">Days Remaining</div>
    <div id="daysNumber">--</div>
    <div class="days-word">CA FOUNDATION</div>
    <div id="statusMsg"></div>
  </div>

  <div class="grid-wrap">
    <div class="grid-label">● Gone &nbsp;● Today &nbsp;○ Left</div>
    <div id="circlesGrid"></div>
  </div>

  <div class="bottom">
    <div id="examTag"></div>
    <div id="progressBar"><div id="progressFill" style="width:0%"></div></div>
    <div id="progressLabel">0% DONE</div>
  </div>

</div>

<button id="resetBtn" onclick="resetApp()">⚙ Reset</button>

<script>
  const KEY = 'ca_v3';

  function today0() {
    const d = new Date(); d.setHours(0,0,0,0); return d;
  }

  function daysBetween(a, b) {
    return Math.round((b - a) / 86400000);
  }

  // ── Time update (every minute only) ──
  function updateTime() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('livetime').textContent = hh + ':' + mm;

    const D = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    const M = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    document.getElementById('livedate').textContent =
      D[now.getDay()] + ', ' + String(now.getDate()).padStart(2,'0') + ' ' + M[now.getMonth()];
  }

  function getStatus(days) {
    if (days < 0)   return 'RESULT AWAITED.';
    if (days === 0) return 'EXAM DAY. JAI HO! 🔥';
    if (days <= 3)  return 'LAST FEW DAYS. ALL IN.';
    if (days <= 7)  return 'FINAL WEEK. LOCK IN.';
    if (days <= 14) return 'TWO WEEKS. NO BREAKS.';
    if (days <= 30) return 'LAST MONTH. GRIND.';
    if (days <= 60) return 'GRIND SEASON.';
    if (days <= 90) return 'BUILD THE HABIT NOW.';
    return 'EARLY START = BIG LEAD.';
  }

  function buildGrid(startDate, examDate) {
    const t     = today0();
    const total = daysBetween(startDate, examDate);
    const gone  = Math.max(0, daysBetween(startDate, t));
    const grid  = document.getElementById('circlesGrid');
    grid.innerHTML = '';

    for (let i = 0; i < total; i++) {
      const d = document.createElement('div');
      d.className = 'dot ' + (i < gone ? 'gone' : i === gone ? 'today' : 'left');
      grid.appendChild(d);
    }
  }

  function render(data) {
    const startDate = new Date(data.start); startDate.setHours(0,0,0,0);
    const examDate  = new Date(data.exam);  examDate.setHours(0,0,0,0);
    const t = today0();

    const daysLeft = daysBetween(t, examDate);
    const total    = daysBetween(startDate, examDate);
    const gone     = Math.max(0, daysBetween(startDate, t));
    const pct      = total > 0 ? Math.min(100, Math.round((gone / total) * 100)) : 0;

    // Big number
    const el = document.getElementById('daysNumber');
    el.textContent = Math.max(daysLeft, 0);
    el.className   = daysLeft <= 7 ? 'urgent' : daysLeft <= 30 ? 'warning' : '';

    document.getElementById('statusMsg').textContent = getStatus(daysLeft);

    // Exam tag
    const M = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    document.getElementById('examTag').textContent =
      'TARGET · ' + M[examDate.getMonth()] + ' ' +
      String(examDate.getDate()).padStart(2,'0') + ', ' + examDate.getFullYear();

    // Progress
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = pct + '% PREP DONE';

    // Circles
    buildGrid(startDate, examDate);

    // Switch screens
    document.getElementById('setup').style.display  = 'none';
    document.getElementById('screen').style.display = 'flex';

    // Start clock
    updateTime();
    setInterval(updateTime, 60000);
  }

  function saveSetup() {
    const s = document.getElementById('startInput').value;
    const e = document.getElementById('examInput').value;
    if (!s || !e) { alert('Dono dates bharo!'); return; }
    if (new Date(e) <= new Date(s)) { alert('Exam date, start date se baad honi chahiye!'); return; }
    const data = { start: s, exam: e };
    localStorage.setItem(KEY, JSON.stringify(data));
    render(data);
  }

  function resetApp() {
    if (!confirm('Reset karein? Sab data hata jayega.')) return;
    localStorage.removeItem(KEY);
    document.getElementById('screen').style.display = 'none';
    document.getElementById('setup').style.display  = 'flex';
  }

  // ── INIT ──
  window.onload = () => {
    // Set default dates in setup
    const todayStr = today0().toISOString().split('T')[0];
    document.getElementById('startInput').value = todayStr;
    document.getElementById('examInput').value  = '2025-05-14';

    // Check saved data
    const saved = localStorage.getItem(KEY);
    if (saved) {
      try { render(JSON.parse(saved)); }
      catch(e) { localStorage.removeItem(KEY); }
    }
    // else setup screen already visible by default
  };
</script>
</body>
</html>
