<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#000000"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <title>CA Countdown</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%; background:#000; color:#e8e8e8;
      font-family:'Space Mono', monospace; -webkit-tap-highlight-color:transparent; overflow:hidden;
    }

    /* SETUP */
    #setup {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; height:100vh; gap:22px; padding:40px 28px;
    }
    #setup h1 { font-family:'Bebas Neue',cursive; font-size:40px; letter-spacing:6px; color:#c8a96e; text-align:center; line-height:1.1; }
    #setup p { font-size:11px; color:#333; letter-spacing:3px; text-align:center; text-transform:uppercase; }
    .field { display:flex; flex-direction:column; gap:8px; width:100%; max-width:300px; }
    .field label { font-size:10px; letter-spacing:3px; color:#444; text-transform:uppercase; }
    .field input {
      background:#0d0d0d; border:1px solid #222; border-radius:12px;
      color:#e8e8e8; font-family:'Space Mono',monospace; font-size:16px;
      padding:13px 16px; width:100%; outline:none; -webkit-appearance:none;
    }
    .field input:focus { border-color:#c8a96e; }
    .field input::-webkit-calendar-picker-indicator { filter:invert(0.4); }
    .btn-setup {
      background:#c8a96e; border:none; border-radius:14px; color:#000;
      font-family:'Bebas Neue',cursive; font-size:22px; letter-spacing:5px;
      padding:15px; width:100%; max-width:300px; cursor:pointer;
    }

    /* SCREEN */
    #screen {
      display:none; flex-direction:column; align-items:center;
      justify-content:space-between; height:100vh; width:100vw; padding:48px 20px 24px;
    }
    .top { display:flex; flex-direction:column; align-items:center; }
    #livedate { font-family:'Bebas Neue',cursive; font-size:30px; letter-spacing:6px; color:#252525; text-transform:uppercase; }
    .center { display:flex; flex-direction:column; align-items:center; gap:2px; }
    .days-label { font-size:10px; letter-spacing:5px; color:#222; text-transform:uppercase; margin-bottom:4px; }
    #daysNumber { font-family:'Bebas Neue',cursive; font-size:clamp(110px,34vw,170px); line-height:0.85; color:#c8a96e; letter-spacing:-4px; }
    #daysNumber.urgent  { color:#e05555; }
    #daysNumber.warning { color:#e0a030; }
    #statusMsg { font-family:'Bebas Neue',cursive; font-size:19px; letter-spacing:4px; color:#252525; text-align:center; margin-top:6px; }

    /* circles */
    .grid-wrap { display:flex; flex-direction:column; align-items:center; gap:8px; width:100%; }
    .grid-label { font-size:8px; letter-spacing:4px; color:#1a1a1a; text-transform:uppercase; }
    #circlesGrid { display:flex; flex-wrap:wrap; justify-content:center; gap:5px; width:100%; max-width:340px; padding:0 2px; }
    .dot { border-radius:50%; flex-shrink:0; width:13px; height:13px; }
    .dot.gone  { background:#c8a96e; }
    .dot.today { background:#fff; box-shadow:0 0 8px rgba(255,255,255,0.8); }
    .dot.left  { background:#1a1a1a; }

    /* bottom */
    .bottom { display:flex; flex-direction:column; align-items:center; gap:5px; width:100%; }
    #examTag { font-size:9px; letter-spacing:3px; color:#1a1a1a; text-transform:uppercase; }
    #progressBar { width:160px; height:2px; background:#111; border-radius:2px; overflow:hidden; margin-top:3px; }
    #progressFill { height:100%; background:#c8a96e; border-radius:2px; }
    #progressLabel { font-size:8px; letter-spacing:2px; color:#1a1a1a; margin-top:3px; }

    /* DOWNLOAD BTN */
    #dlBtn {
      margin-top:12px;
      background:linear-gradient(135deg,#c8a96e,#8a5c28);
      border:none; border-radius:14px; color:#000;
      font-family:'Bebas Neue',cursive; font-size:20px;
      letter-spacing:4px; padding:14px 0; width:100%;
      max-width:300px; cursor:pointer;
      box-shadow:0 4px 24px rgba(200,169,110,0.2);
    }
    #dlBtn:active { opacity:0.8; }

    /* flash */
    #flash { position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; transition:opacity 0.15s; z-index:999; }

    /* reset */
    #resetBtn {
      position:fixed; bottom:10px; right:10px; background:transparent;
      border:1px solid #111; border-radius:8px; color:#1e1e1e;
      font-family:'Space Mono',monospace; font-size:8px; letter-spacing:1px;
      padding:5px 9px; cursor:pointer; text-transform:uppercase; z-index:99;
    }

    #offscreen { display:none; }
  </style>
</head>
<body>

<div id="flash"></div>

<!-- SETUP -->
<div id="setup">
  <h1>CA Foundation<br/>Countdown</h1>
  <p>Ek baar set karo — phir bhool jao</p>
  <div class="field">
    <label>Start Date (Aaj)</label>
    <input type="date" id="startInput"/>
  </div>
  <div class="field">
    <label>Exam Date</label>
    <input type="date" id="examInput"/>
  </div>
  <button class="btn-setup" onclick="saveSetup()">SHURU KARO ▶</button>
</div>

<!-- SCREEN -->
<div id="screen">
  <div class="top">
    <div id="livedate">MON, 01 JAN</div>
  </div>
  <div class="center">
    <div class="days-label">Days Remaining</div>
    <div id="daysNumber">--</div>
    <div id="statusMsg"></div>
  </div>
  <div class="grid-wrap">
    <div class="grid-label">● Gone &nbsp;◉ Today &nbsp;○ Left</div>
    <div id="circlesGrid"></div>
  </div>
  <div class="bottom">
    <div id="examTag"></div>
    <div id="progressBar"><div id="progressFill" style="width:0%"></div></div>
    <div id="progressLabel">0% DONE</div>
    <button id="dlBtn" onclick="downloadWallpaper()">⬇ SAVE AS WALLPAPER</button>
  </div>
</div>

<canvas id="offscreen"></canvas>
<button id="resetBtn" onclick="resetApp()">⚙ Reset</button>

<script>
const KEY='ca_v4';
let _data=null;

function today0(){const d=new Date();d.setHours(0,0,0,0);return d;}
function daysBetween(a,b){return Math.round((b-a)/86400000);}
const DD=['SUN','MON','TUE','WED','THU','FRI','SAT'];
const MM=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

function updateDate(){
  const n=new Date();
  document.getElementById('livedate').textContent=
    DD[n.getDay()]+',  '+String(n.getDate()).padStart(2,'0')+' '+MM[n.getMonth()];
}

function getStatus(d){
  if(d<0)  return 'RESULT AWAITED.';
  if(d===0)return 'EXAM DAY. JAI HO!';
  if(d<=3) return 'LAST FEW DAYS. ALL IN.';
  if(d<=7) return 'FINAL WEEK. LOCK IN.';
  if(d<=14)return 'TWO WEEKS. NO BREAKS.';
  if(d<=30)return 'LAST MONTH. GRIND.';
  if(d<=60)return 'GRIND SEASON.';
  if(d<=90)return 'BUILD THE HABIT NOW.';
  return 'EARLY START = BIG LEAD.';
}

function buildGrid(startDate,examDate){
  const t=today0(),total=daysBetween(startDate,examDate),gone=Math.max(0,daysBetween(startDate,t));
  const grid=document.getElementById('circlesGrid');
  grid.innerHTML='';
  for(let i=0;i<total;i++){
    const d=document.createElement('div');
    d.className='dot '+(i<gone?'gone':i===gone?'today':'left');
    grid.appendChild(d);
  }
}

function render(data){
  _data=data;
  const sd=new Date(data.start);sd.setHours(0,0,0,0);
  const ed=new Date(data.exam);ed.setHours(0,0,0,0);
  const t=today0();
  const dl=daysBetween(t,ed);
  const total=daysBetween(sd,ed);
  const gone=Math.max(0,daysBetween(sd,t));
  const pct=total>0?Math.min(100,Math.round(gone/total*100)):0;

  const el=document.getElementById('daysNumber');
  el.textContent=Math.max(dl,0);
  el.className=dl<=7?'urgent':dl<=30?'warning':'';
  document.getElementById('statusMsg').textContent=getStatus(dl);
  document.getElementById('examTag').textContent='TARGET · '+MM[ed.getMonth()]+' '+String(ed.getDate()).padStart(2,'0')+', '+ed.getFullYear();
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=pct+'% PREP DONE';
  buildGrid(sd,ed);

  document.getElementById('setup').style.display='none';
  document.getElementById('screen').style.display='flex';
  updateDate();
  setInterval(updateDate,60000);

  // MacroDroid auto-download trigger: ?auto=1
  if(new URLSearchParams(window.location.search).get('auto')==='1'){
    setTimeout(()=>downloadWallpaper(),2000);
  }
}

// ══════════════════════════════
//  CANVAS WALLPAPER — 1080×2340
// ══════════════════════════════
function downloadWallpaper(){
  if(!_data)return;
  const W=1080,H=2340;
  const canvas=document.getElementById('offscreen');
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');

  const sd=new Date(_data.start);sd.setHours(0,0,0,0);
  const ed=new Date(_data.exam);ed.setHours(0,0,0,0);
  const t=today0();
  const dl=daysBetween(t,ed);
  const total=daysBetween(sd,ed);
  const gone=Math.max(0,daysBetween(sd,t));
  const pct=total>0?Math.min(100,Math.round(gone/total*100)):0;
  const numCol=dl<=7?'#e05555':dl<=30?'#e0a030':'#c8a96e';

  // bg
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  // noise
  for(let i=0;i<3000;i++){ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.012})`;ctx.fillRect(Math.random()*W,Math.random()*H,1,1);}

  ctx.textAlign='center';

  // date
  const now=new Date();
  ctx.font='600 60px "Bebas Neue",cursive';ctx.fillStyle='#1e1e1e';
  ctx.fillText(DD[now.getDay()]+',  '+String(now.getDate()).padStart(2,'0')+' '+MM[now.getMonth()],W/2,200);

  // label
  ctx.font='400 34px "Space Mono",monospace';ctx.fillStyle='#1c1c1c';
  ctx.fillText('DAYS  REMAINING',W/2,560);

  // big number
  ctx.font='bold 680px "Bebas Neue",cursive';
  ctx.fillStyle=numCol;ctx.shadowColor=numCol;ctx.shadowBlur=80;
  ctx.fillText(Math.max(dl,0),W/2,1090);
  ctx.shadowBlur=0;

  // status
  ctx.font='bold 48px "Bebas Neue",cursive';ctx.fillStyle='#222';
  ctx.fillText(getStatus(dl),W/2,1170);

  // divider
  ctx.strokeStyle='#0e0e0e';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(220,1230);ctx.lineTo(W-220,1230);ctx.stroke();

  // circles grid
  const dotR=17,gap=13,cols=16;
  const gridW=cols*(dotR*2+gap)-gap;
  let cx=(W-gridW)/2+dotR,cy=1340;
  for(let i=0;i<total;i++){
    if(i>0&&i%cols===0){cy+=dotR*2+gap;cx=(W-gridW)/2+dotR;}
    if(i<gone){ctx.fillStyle='#c8a96e';}
    else if(i===gone){ctx.fillStyle='#ffffff';ctx.shadowColor='#fff';ctx.shadowBlur=18;}
    else{ctx.fillStyle='#191919';}
    ctx.beginPath();ctx.arc(cx,cy,dotR,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    cx+=dotR*2+gap;
  }

  // progress bar
  const barY=cy+80,barW=580,barH=4,barX=(W-barW)/2;
  ctx.fillStyle='#111';
  ctx.beginPath();if(ctx.roundRect)ctx.roundRect(barX,barY,barW,barH,4);else ctx.rect(barX,barY,barW,barH);ctx.fill();
  ctx.fillStyle='#c8a96e';
  ctx.beginPath();if(ctx.roundRect)ctx.roundRect(barX,barY,barW*(pct/100),barH,4);else ctx.rect(barX,barY,barW*(pct/100),barH);ctx.fill();
  ctx.font='400 26px "Space Mono",monospace';ctx.fillStyle='#1a1a1a';
  ctx.fillText(pct+'%  PREP  DONE',W/2,barY+48);

  // exam tag
  ctx.font='400 28px "Space Mono",monospace';ctx.fillStyle='#111';
  ctx.fillText('TARGET · '+MM[ed.getMonth()]+' '+String(ed.getDate()).padStart(2,'0')+', '+ed.getFullYear(),W/2,H-100);

  // download
  const link=document.createElement('a');
  link.download='ca-wallpaper.png';
  link.href=canvas.toDataURL('image/png');
  link.click();

  // flash
  const fl=document.getElementById('flash');
  fl.style.opacity='0.35';
  setTimeout(()=>fl.style.opacity='0',200);
}

function saveSetup(){
  const s=document.getElementById('startInput').value;
  const e=document.getElementById('examInput').value;
  if(!s||!e){alert('Dono dates bharo!');return;}
  if(new Date(e)<=new Date(s)){alert('Exam date baad mein honi chahiye!');return;}
  const data={start:s,exam:e};
  localStorage.setItem(KEY,JSON.stringify(data));
  render(data);
}

function resetApp(){
  if(!confirm('Reset karein?'))return;
  localStorage.removeItem(KEY);_data=null;
  document.getElementById('screen').style.display='none';
  document.getElementById('setup').style.display='flex';
}

window.onload=()=>{
  const ts=today0().toISOString().split('T')[0];
  document.getElementById('startInput').value=ts;
  document.getElementById('examInput').value='2025-05-14';
  const saved=localStorage.getItem(KEY);
  if(saved){try{render(JSON.parse(saved));}catch(e){localStorage.removeItem(KEY);}}
};
</script>
</body>
</html>
