<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#000000"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <title>CA Countdown</title>
  <link rel="manifest" href="manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --black:  #000000;
      --gold:   #c8a96e;
      --gold2:  #6a4e28;
      --dim:    #1a1a1a;
      --dimmer: #0d0d0d;
      --gone:   #c8a96e;   /* filled circle = day gone */
      --left:   #1e1e1e;   /* empty circle = day left */
      --today:  #ffffff;   /* today's circle */
    }

    html, body {
      width:100%; height:100%;
      background: var(--black);
      color: #e8e8e8;
      font-family: 'Space Mono', monospace;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    /* ───── MAIN SCREEN ───── */
    #screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      height: 100vh;
      width: 100vw;
      padding: 42px 20px 32px;
    }

    /* ── TOP: date + time ── */
    .top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      width: 100%;
    }

    #livetime {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(52px, 16vw, 80px);
      letter-spacing: 6px;
      color: #e8e8e8;
      line-height: 1;
    }

    #livedate {
      font-size: 10px;
      letter-spacing: 5px;
      color: #2e2e2e;
      text-transform: uppercase;
    }

    /* ── COUNTDOWN CENTER ── */
    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .days-label {
      font-size: 9px;
      letter-spacing: 5px;
      color: #2a2a2a;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    #daysNumber {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(90px, 28vw, 150px);
      line-height: 0.9;
      color: var(--gold);
      letter-spacing: -2px;
    }

    #daysNumber.urgent  { color: #e05555; }
    #daysNumber.warning { color: #e0a030; }

    .days-word {
      font-size: 10px;
      letter-spacing: 7px;
      color: var(--gold2);
      text-transform: uppercase;
      margin-top: 6px;
    }

    #statusMsg {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(14px, 4vw, 20px);
      letter-spacing: 3px;
      color: #2a2a2a;
      text-align: center;
      margin-top: 8px;
    }

    /* ── CIRCLES GRID ── */
    .grid-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .grid-label {
      font-size: 8px;
      letter-spacing: 4px;
      color: #222;
      text-transform: uppercase;
    }

    #circlesGrid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 5px;
      width: 100%;
      max-width: 340px;
    }

    .circle {
      border-radius: 50%;
      flex-shrink: 0;
    }

    .circle.gone  { background: var(--gone); }
    .circle.today { background: var(--today); box-shadow: 0 0 8px rgba(255,255,255,0.6); }
    .circle.left  { background: var(--left); }

    /* ── BOTTOM ── */
    .bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .exam-tag {
      font-size: 8px;
      letter-spacing: 4px;
      color: #1e1e1e;
      text-transform: uppercase;
    }

    .thin-line {
      width: 40px;
      height: 1px;
      background: #111;
      margin: 4px 0;
    }

    #progressBar {
      width: 160px;
      height: 2px;
      background: #111;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 4px;
    }

    #progressFill {
      height: 100%;
      background: var(--gold);
      border-radius: 2px;
      transition: width 0s;
    }

    #progressLabel {
      font-size: 8px;
      letter-spacing: 2px;
      color: #222;
      margin-top: 4px;
    }

    /* ───── SETUP SCREEN ───── */
    #setup {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 20px;
      padding: 40px 28px;
    }

    #setup h1 {
      font-family: 'Bebas Neue', cursive;
      font-size: 36px;
      letter-spacing: 6px;
      color: var(--gold);
      text-align: center;
    }

    .field { display:flex; flex-direction:column; gap:8px; width:100%; max-width:300px; }
    .field label { font-size:9px; letter-spacing:3px; color:#333; text-transform:uppercase; }
    .field input {
      background: #0d0d0d;
      border: 1px solid #1a1a1a;
      border-radius: 10px;
      color: #e8e8e8;
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      padding: 12px 16px;
      width: 100%;
      outline: none;
      -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--gold); }
    .field input::-webkit-calendar-picker-indicator { filter: invert(0.3); }

    .btn {
      background: var(--gold);
      border: none;
      border-radius: 12px;
      color: #000;
      font-family: 'Bebas Neue', cursive;
      font-size: 20px;
      letter-spacing: 4px;
      padding: 14px;
      width: 100%;
      max-width: 300px;
      cursor: pointer;
    }

    .reset-btn {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: transparent;
      border: 1px solid #111;
      border-radius: 8px;
      color: #1e1e1e;
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      letter-spacing: 2px;
      padding: 6px 12px;
      cursor: pointer;
      text-transform: uppercase;
      z-index: 10;
    }
  </style>
</head>
<body>

<!-- ── MAIN SCREEN ── -->
<div id="screen">

  <div class="top">
    <div id="livetime">00:00</div>
    <div id="livedate">MON, 01 JAN</div>
  </div>

  <div class="center">
    <div class="days-label">Days Remaining</div>
    <div id="daysNumber">--</div>
    <div class="days-word">CA FOUNDATION</div>
    <div id="statusMsg">LOADING...</div>
  </div>

  <div class="grid-section">
    <div class="grid-label">Life Calendar · Today to Exam</div>
    <div id="circlesGrid"></div>
  </div>

  <div class="bottom">
    <div class="exam-tag" id="examTag">TARGET · MAY 14, 2025</div>
    <div class="thin-line"></div>
    <div id="progressBar"><div id="progressFill" style="width:0%"></div></div>
    <div id="progressLabel">0% DONE</div>
  </div>

</div>

<!-- ── SETUP SCREEN ── -->
<div id="setup">
  <h1>CA Foundation<br/>Countdown</h1>

  <div class="field">
    <label>Your Start Date (Today)</label>
    <input type="date" id="startInput"/>
  </div>

  <div class="field">
    <label>Exam Date</label>
    <input type="date" id="examInput"/>
  </div>

  <button class="btn" onclick="saveSetup()">START COUNTDOWN</button>
</div>

<button class="reset-btn" onclick="resetApp()">⚙</button>

<script>
  const EXAM_DATE  = new Date('2025-05-14');
  const KEY = 'ca_v2';

  // ── UTILS ──
  function today0() {
    const d = new Date(); d.setHours(0,0,0,0); return d;
  }

  function getDays(from, to) {
    return Math.round((to - from) / 86400000);
  }

  // ── TIME (only updates every minute — battery friendly) ──
  function updateTime() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('livetime').textContent = hh + ':' + mm;

    const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    document.getElementById('livedate').textContent =
      days[now.getDay()] + ', ' +
      String(now.getDate()).padStart(2,'0') + ' ' +
      months[now.getMonth()];
  }

  // ── CIRCLES GRID ──
  function buildGrid(startDate, examDate) {
    const t = today0();
    const total = getDays(startDate, examDate);
    const gone  = getDays(startDate, t);
    const grid  = document.getElementById('circlesGrid');
    grid.innerHTML = '';

    // Responsive circle size
    const vw = window.innerWidth;
    const cols = Math.min(total, vw < 360 ? 14 : 16);
    const gap = 5;
    const available = Math.min(vw - 40, 340);
    const size = Math.floor((available - (cols - 1) * gap) / cols);

    for (let i = 0; i < total; i++) {
      const c = document.createElement('div');
      c.className = 'circle ' + (i < gone ? 'gone' : i === gone ? 'today' : 'left');
      c.style.width  = size + 'px';
      c.style.height = size + 'px';
      grid.appendChild(c);
    }
  }

  // ── STATUS ──
  function getStatus(days) {
    if (days < 0)   return 'EXAM OVER.';
    if (days === 0) return 'EXAM DAY. JAI HO.';
    if (days <= 3)  return 'LAST FEW DAYS. ALL IN.';
    if (days <= 7)  return 'FINAL WEEK. LOCK IN.';
    if (days <= 14) return 'TWO WEEKS. NO BREAKS.';
    if (days <= 30) return 'LAST MONTH. GRIND.';
    if (days <= 60) return 'GRIND SEASON.';
    return 'EARLY START = BIG LEAD.';
  }

  // ── RENDER MAIN ──
  function render(data) {
    const startDate = new Date(data.start); startDate.setHours(0,0,0,0);
    const examDate  = new Date(data.exam);  examDate.setHours(0,0,0,0);
    const t = today0();

    const daysLeft  = getDays(t, examDate);
    const total     = getDays(startDate, examDate);
    const gone      = getDays(startDate, t);
    const pct       = Math.min(100, Math.max(0, Math.round((gone / total) * 100)));

    // Days number
    const el = document.getElementById('daysNumber');
    el.textContent = Math.max(daysLeft, 0);
    el.className = daysLeft <= 7 ? 'urgent' : daysLeft <= 30 ? 'warning' : '';

    document.getElementById('statusMsg').textContent = getStatus(daysLeft);

    // Exam tag
    const ed = examDate;
    const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    document.getElementById('examTag').textContent =
      'TARGET · ' + months[ed.getMonth()] + ' ' + String(ed.getDate()).padStart(2,'0') + ', ' + ed.getFullYear();

    // Progress
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = pct + '% DONE';

    // Grid
    buildGrid(startDate, examDate);

    // Show screen
    document.getElementById('setup').style.display  = 'none';
    document.getElementById('screen').style.display = 'flex';
  }

  // ── SETUP SAVE ──
  function saveSetup() {
    const s = document.getElementById('startInput').value;
    const e = document.getElementById('examInput').value;
    if (!s || !e) { alert('Dono dates bharo!'); return; }
    const data = { start: s, exam: e };
    localStorage.setItem(KEY, JSON.stringify(data));
    render(data);
  }

  // ── RESET ──
  function resetApp() {
    localStorage.removeItem(KEY);
    document.getElementById('screen').style.display = 'none';
    document.getElementById('setup').style.display  = 'flex';
  }

  // ── INIT ──
  window.onload = () => {
    // Default setup values
    const todayStr = today0().toISOString().split('T')[0];
    document.getElementById('startInput').value = todayStr;
    document.getElementById('examInput').value  = '2025-05-14';

    const saved = localStorage.getItem(KEY);
    if (saved) {
      render(JSON.parse(saved));
    } else {
      document.getElementById('screen').style.display = 'none';
      document.getElementById('setup').style.display  = 'flex';
    }

    // Time: update once now, then every minute
    updateTime();
    setInterval(updateTime, 60000); // 1 min interval only — minimal battery
  };
</script>
</body>
</html>
